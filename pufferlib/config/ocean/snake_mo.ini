[base]
package = ocean
env_name = puffer_snake_mo
policy_name = Snake
rnn_name = Recurrent

[policy]
q_value_critic = False
weight_conditioning = False

[eval]
action_selection = policy
num_policies = 1

[env]
num_envs = 4
width = 640
height = 360
num_snakes = 256
num_food = 4096
vision = 5
leave_corpse_on_death = True
reward_food = 0.1
reward_corpse = 0.1
reward_death = -1.0
gamma = 0.9997067226101388
freeze_on_done = False
max_ticks = 0
max_ticks_offset_mod = 1

[vec]
num_envs = 16

[train]
total_timesteps = 500_000_000
adam_beta1 = 0.5
adam_beta2 = 0.99992
adam_eps = 3.6585e-13
bptt_horizon = 32
clip_coef = 1
ent_coef = 0.0019401
gae_lambda = 0.97268
gamma = 0.89138
learning_rate = 0.026259
max_grad_norm = 5
min_Ir_ratio = 0
minibatch_size = 32768
prio_alpha = 0.59599
prio_beta0 = 0.95639
vf_clip_coef = 1.23954
vf_coef = 4.54287
vtrace_c_clip = 1.7047
vtrace_rho_clip = 2.49973

[sweep.train.total_timesteps]
distribution = log_normal
min = 5e7
max = 2e8
mean = 1e8
scale = auto
