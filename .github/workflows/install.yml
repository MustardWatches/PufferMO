name: install

on:
  push:
  pull_request:

jobs:
  test:
    name: test ${{ matrix.py }} - ${{ matrix.os }} - ${{ matrix.env }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        py:
          - "3.11"
          - "3.10"
          - "3.9"
        env:
          - pip
          - conda
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install GSL (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libgsl-dev

      - name: Install GSL (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install gsl
          GSL_PREFIX="$(brew --prefix gsl)"
          echo "LDFLAGS=-L${GSL_PREFIX}/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I${GSL_PREFIX}/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=${GSL_PREFIX}/lib" >> $GITHUB_ENV
          echo "CPATH=${GSL_PREFIX}/include" >> $GITHUB_ENV

      - name: Setup Conda
        if: matrix.env == 'conda'
        uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: ${{ matrix.py }}
          miniconda-version: "latest"
          activate-environment: test-env
          auto-update-conda: true

      - name: Setup Python for pip
        if: matrix.env == 'pip'
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.py }}

      - name: Upgrade pip
        run: python -m pip install -U pip

      - name: Install build dependencies
        run: pip install --upgrade "setuptools>=69.0.0" "packaging>=24.2" "numpy<2.0" wheel

      - name: Install PyTorch CPU  
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      
      - name: Install pufferlib
        run: pip install -e . --no-build-isolation
